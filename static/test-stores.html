<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Test - NullClaw Nexus</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #0a0a0f;
      color: #e0e0e0;
    }
    h1 { color: #7c3aed; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background: #6d28d9; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    pre {
      background: #1a1a24;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>🧪 Store Test</h1>
  <p>Test localStorage functionality for NullClaw Nexus stores</p>

  <div>
    <button onclick="testStores()">Test All Stores</button>
    <button onclick="clearStores()">Clear All Stores</button>
    <button onclick="viewStores()">View Stored Data</button>
  </div>

  <div id="output"></div>

  <script>
    function log(message, type = 'info') {
      const output = document.getElementById('output');
      const div = document.createElement('div');
      div.className = type;
      div.textContent = message;
      output.appendChild(div);
    }

    function testStores() {
      document.getElementById('output').innerHTML = '';
      log('Testing stores...', 'info');

      try {
        // Test gateway config (use CORS proxy URL for browser access)
        const gatewayConfig = {
          url: 'http://127.0.0.1:3001',
          connected: false,
          provider: 'ollama',
          model: 'llama3.1',
          bearerToken: null,
          paired: false
        };
        localStorage.setItem('gatewayConfig', JSON.stringify(gatewayConfig));
        log('✓ Gateway config stored (using CORS proxy)', 'success');

        // Test license
        const license = {
          key: 'NULLCLAW-CREATOR-UNLIMITED',
          valid: true,
          tier: 'pro',
          activatedAt: new Date().toISOString()
        };
        localStorage.setItem('license', JSON.stringify(license));
        log('✓ License stored', 'success');

        log('\nStores test completed successfully!', 'success');
        log('You can now reload the main app.', 'success');
      } catch (error) {
        log('✗ Error: ' + error.message, 'error');
      }
    }

    function clearStores() {
      document.getElementById('output').innerHTML = '';
      localStorage.removeItem('gatewayConfig');
      localStorage.removeItem('license');
      log('✓ All stores cleared', 'success');
    }

    function viewStores() {
      document.getElementById('output').innerHTML = '';
      
      const gatewayConfig = localStorage.getItem('gatewayConfig');
      const license = localStorage.getItem('license');

      log('Gateway Config:', 'info');
      const pre1 = document.createElement('pre');
      pre1.textContent = gatewayConfig ? JSON.stringify(JSON.parse(gatewayConfig), null, 2) : 'Not set';
      document.getElementById('output').appendChild(pre1);

      log('\nLicense:', 'info');
      const pre2 = document.createElement('pre');
      pre2.textContent = license ? JSON.stringify(JSON.parse(license), null, 2) : 'Not set';
      document.getElementById('output').appendChild(pre2);
    }

    // Auto-view on load
    viewStores();
  </script>
</body>
</html>
