<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate NullClaw Nexus Icons</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #0a0a0f;
      color: #e0e0ff;
    }
    h1 {
      background: linear-gradient(135deg, #7c3aed, #00f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    canvas {
      border: 2px solid #7c3aed;
      margin: 20px 0;
      border-radius: 12px;
    }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 10px 10px 0;
    }
    button:hover {
      background: #9333ea;
    }
    .instructions {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>NullClaw Nexus Icon Generator</h1>
  
  <div class="instructions">
    <h3>Instructions:</h3>
    <ol>
      <li>Click the buttons below to generate icons</li>
      <li>Right-click each canvas and "Save image as..."</li>
      <li>Save as <code>icon-192.png</code> and <code>icon-512.png</code></li>
      <li>Place files in <code>nullclaw-nexus/static/</code> folder</li>
    </ol>
  </div>

  <h2>192x192 Icon</h2>
  <button onclick="generateIcon(192)">Generate 192x192</button>
  <br>
  <canvas id="canvas192" width="192" height="192"></canvas>

  <h2>512x512 Icon</h2>
  <button onclick="generateIcon(512)">Generate 512x512</button>
  <br>
  <canvas id="canvas512" width="512" height="512"></canvas>

  <script>
    function generateIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const ctx = canvas.getContext('2d');

      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#7c3aed');
      gradient.addColorStop(1, '#00f0ff');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      // Add subtle pattern
      ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
      for (let i = 0; i < size; i += 20) {
        ctx.fillRect(i, 0, 1, size);
        ctx.fillRect(0, i, size, 1);
      }

      // Draw "N" letter
      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.6}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('N', size / 2, size / 2);

      // Add glow effect
      ctx.shadowColor = '#00f0ff';
      ctx.shadowBlur = size * 0.05;
      ctx.fillText('N', size / 2, size / 2);
    }

    // Auto-generate on load
    window.onload = () => {
      generateIcon(192);
      generateIcon(512);
    };
  </script>
</body>
</html>
